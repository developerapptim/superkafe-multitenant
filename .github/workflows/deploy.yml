# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy Superkafe Multitenant

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Pastikan nama ini sesuai dengan repositori Anda
  IMAGE_NAME_BACKEND: developerapptim/superkafe-backend
  IMAGE_NAME_FRONTEND: developerapptim/superkafe-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DUITKU_MERCHANT_CODE: ${{ secrets.DUITKU_MERCHANT_CODE }}
          DUITKU_API_KEY: ${{ secrets.DUITKU_API_KEY }}
          DUITKU_MODE: ${{ secrets.DUITKU_MODE }}
          DUITKU_CALLBACK_URL: ${{ secrets.DUITKU_CALLBACK_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          DUITKU_URL: ${{ secrets.DUITKU_URL }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: MONGODB_URI,JWT_SECRET,API_KEY,SMTP_USER,SMTP_PASS,DUITKU_MERCHANT_CODE,DUITKU_API_KEY,DUITKU_MODE,DUITKU_CALLBACK_URL,FRONTEND_URL,BACKEND_URL,N8N_WEBHOOK_URL,SENTRY_DSN,VITE_SENTRY_DSN,DUITKU_URL 
          script: |
            cd /root/superkafe-multitenant
            git fetch --all
            git reset --hard origin/main

            echo "MONGODB_URI=$MONGODB_URI" > backend/.env
            echo "JWT_SECRET=$JWT_SECRET" >> backend/.env
            echo "API_KEY=$API_KEY" >> backend/.env
            echo "SMTP_USER=$SMTP_USER" >> backend/.env
            echo "SMTP_PASS=$SMTP_PASS" >> backend/.env
            echo "PORT=5001" >> backend/.env
            echo "NODE_ENV=production" >> backend/.env
            echo "DUITKU_MERCHANT_CODE=$DUITKU_MERCHANT_CODE" >> backend/.env
            echo "DUITKU_API_KEY=$DUITKU_API_KEY" >> backend/.env
            echo "DUITKU_MODE=$DUITKU_MODE" >> backend/.env
            echo "BACKEND_URL=$BACKEND_URL" >> backend/.env
            echo "DUITKU_CALLBACK_URL=$DUITKU_CALLBACK_URL" >> backend/.env
            echo "N8N_WEBHOOK_URL=$N8N_WEBHOOK_URL" >> backend/.env
            echo "SENTRY_DSN=$SENTRY_DSN" >> backend/.env
            echo "VITE_SENTRY_DSN=$VITE_SENTRY_DSN" >> frontend/.env
            echo "DUITKU_URL=$DUITKU_URL" >> backend/.env

            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d

            sleep 10
            
            # Run automated deployment script (validates env, checks DB, auto-initializes if needed)
            docker compose exec backend npm run deploy
            docker image prune -f