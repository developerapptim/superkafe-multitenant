services:
  # Database diletakkan di sini agar satu jaringan dengan aplikasi
  mongodb-v2:
    image: mongo:latest
    container_name: mongodb-v2
    ports:
      - "27018:27017"
    volumes:
      - mongo_data_v2:/data/db
    restart: always

  backend:
    container_name: superkafe-backend
    image: ghcr.io/developerapptim/superkafe-backend:latest
    ports:
      - "5001:5001"
    restart: always
    command: npx pm2-runtime start ecosystem.config.js
    environment:
      - MONGODB_URI=mongodb://mongodb-v2:27017/superkafe_main
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongodb-v2
      - redis
    env_file:
      - ./backend/.env
    volumes:
      # Mount uploads folder untuk persistensi data
      # Data akan tersimpan di host VPS dan tidak hilang saat container restart
      # CRITICAL: Path harus match dengan WORKDIR di Dockerfile (/usr/src/app)
      - ./backend/public/uploads:/usr/src/app/public/uploads

  frontend:
    container_name: superkafe-frontend
    image: ghcr.io/developerapptim/superkafe-frontend:latest
    ports:
      - "5002:80"
    restart: always
    environment:
      - VITE_API_URL=https://superkafe.com/api
    # Tambahkan ini di bawah service terakhir
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data_v2:


